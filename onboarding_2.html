<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Mobile Container Emulator -->
<div class="relative flex h-[844px] w-[390px] flex-col bg-background-light dark:bg-background-dark shadow-2xl overflow-hidden rounded-[3rem] border-8 border-slate-800 dark:border-slate-900">
<!-- Top Bar -->
<div class="flex items-center p-6 pb-2 justify-end">
<button class="text-slate-500 dark:text-slate-400 text-sm font-semibold hover:text-primary transition-colors">Skip</button>
</div>
<!-- Illustration Area with Glassmorphism -->
<div class="flex-1 flex flex-col items-center justify-center px-8 relative">
<div class="relative w-full aspect-square flex items-center justify-center">
<!-- Decorative background elements -->
<div class="absolute inset-0 bg-primary/10 rounded-full blur-3xl"></div>
<!-- Main Illustration Card -->
<div class="relative z-10 w-full aspect-square rounded-xl overflow-hidden bg-slate-200 dark:bg-slate-800/50 backdrop-blur-md border border-slate-300/30 dark:border-slate-700/30 shadow-2xl flex items-center justify-center" data-alt="Illustration of a fitness plan with muscle highlights">
<div class="flex flex-col items-center gap-4 w-full p-6">
<!-- Simulated Workout Plan UI -->
<div class="w-full bg-white/10 backdrop-blur-lg rounded-lg p-4 border border-white/10">
<div class="flex items-center gap-3 mb-4">
<span class="material-symbols-outlined text-primary text-3xl">fitness_center</span>
<div class="h-3 w-24 bg-primary/40 rounded-full"></div>
</div>
<div class="space-y-3">
<div class="h-2 w-full bg-slate-500/20 rounded-full"></div>
<div class="h-2 w-3/4 bg-slate-500/20 rounded-full"></div>
<div class="h-2 w-5/6 bg-slate-500/20 rounded-full"></div>
</div>
</div>
<!-- Simulated Muscle Focus UI -->
<div class="grid grid-cols-2 gap-3 w-full">
<div class="bg-primary/20 backdrop-blur-md p-3 rounded-lg border border-primary/30 flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="h-2 w-12 bg-primary/40 rounded-full"></div>
</div>
<div class="bg-white/5 backdrop-blur-md p-3 rounded-lg border border-white/10 flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-slate-400"></div>
<div class="h-2 w-12 bg-slate-500/20 rounded-full"></div>
</div>
</div>
</div>
</div>
<!-- Floating Badge -->
<div class="absolute -bottom-4 -right-2 z-20 bg-primary text-white p-4 rounded-xl shadow-lg border-2 border-background-dark">
<span class="material-symbols-outlined text-2xl">remote_gen</span>
</div>
</div>
</div>
<!-- Content Section -->
<div class="px-8 pb-12 pt-8 text-center">
<h1 class="text-slate-900 dark:text-slate-100 text-[32px] font-bold leading-tight mb-4">Personalized Workouts</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed">
                Get AI-generated routines tailored specifically to your body type, equipment, and fitness goals.
            </p>
<!-- Page Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-10">
<div class="h-1.5 w-1.5 rounded-full bg-slate-300 dark:bg-slate-700"></div>
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
<!-- Next Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Bottom Safe Area -->
<div class="h-8 w-full"></div>
</div>
</body></html>
